  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n              <div style=\"padding:16px; border-radius:14px; background:var(--surface); border:1px solid var(--line07);\"><div style=\"font-family:Marcellus,serif; font-size:26px; color:#C9A24C;\">B+<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:0.1em; color:var(--faint); margin-top:3px;\">AVG GRADE<\u002Fdiv><\u002Fdiv>\n              <div style=\"padding:16px; border-radius:14px; background:var(--surface); border:1px solid var(--line07);\"><div style=\"font-family:Marcellus,serif; font-size:26px; color:var(--bone);\">5<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:0.1em; color:var(--faint); margin-top:3px;\">DAY STREAK<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"border-radius:16px; background:var(--surface); border:1px solid var(--line07); overflow:hidden;\">\n              <sc-for list=\"{{ settings }}\" as=\"st\" hint-placeholder-count=\"5\">\n                <div style=\"display:flex; align-items:center; gap:13px; padding:15px 16px; border-bottom:1px solid var(--line05); cursor:pointer;\">\n                  <div style=\"color:{{ st.color }};\">{{ st.icon }}<\u002Fdiv>\n                  <span style=\"flex:1; font-size:14.5px; color:{{ st.color }};\">{{ st.label }}<\u002Fspan>\n                  <svg width=\"7\" height=\"12\" viewBox=\"0 0 8 14\"><path d=\"M1 1l6 6-6 6\" stroke=\"var(--line25)\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n\n      <!-- ===== VOICE-SOON TOAST ===== -->\n      <sc-if value=\"{{ soon }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute; left:50%; transform:translateX(-50%); bottom:108px; z-index:40; display:flex; align-items:center; gap:9px; padding:11px 16px; border-radius:13px; background:var(--toast); border:1px solid rgba(201,162,76,0.3); box-shadow:0 12px 30px rgba(0,0,0,0.5); animation:msToast 0.25s ease both;\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#C9A24C\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polygon points=\"11 5 6 9 2 9 2 15 6 15 11 19 11 5\"><\u002Fpolygon><path d=\"M15.5 8.5a5 5 0 0 1 0 7M19 5a9 9 0 0 1 0 14\"><\u002Fpath><\u002Fsvg>\n          <span style=\"font-size:12.5px; color:var(--text);\">Voice replies — Musashi will speak. <span style=\"color:#C9A24C;\">Coming soon.<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== BOTTOM TAB BAR ===== -->\n      <div style=\"flex-shrink:0; display:flex; padding:10px 6px 26px; background:var(--bg88); backdrop-filter:blur(14px); border-top:1px solid var(--line08);\">\n        <button onclick=\"{{ goAnalyze }}\" style=\"flex:1; background:none; border:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; color:{{ analyzeColor }}; padding:4px 0;\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"3.2\"><\u002Fcircle><path d=\"M12 1.5v3M12 19.5v3M22.5 12h-3M4.5 12h-3\"><\u002Fpath><\u002Fsvg>\n          <span style=\"font-size:9.5px; letter-spacing:0.02em; font-weight:500;\">Analyze<\u002Fspan>\n        <\u002Fbutton>\n        <button onclick=\"{{ goMarket }}\" style=\"flex:1; background:none; border:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; color:{{ marketColor }}; padding:4px 0;\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 2L3 ng:4px 0;\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"8\" r=\"4\"><\u002Fcircle><path d=\"M4 21c0-4 3.5-6 8-6s8 2 8 6\"><\u002Fpath><\u002Fsvg>\n          <span style=\"font-size:9.5px; letter-spacing:0.02em; font-weight:500;\">Profile<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fx-import>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:940},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;dark&quot;,&quot;options&quot;:[&quot;dark&quot;,&quot;light&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Demo&quot;},&quot;proMember&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Demo&quot;},&quot;startTab&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Analyze&quot;,&quot;options&quot;:[&quot;Analyze&quot;,&quot;Market&quot;,&quot;Library&quot;,&quot;Inbox&quot;,&quot;Profile&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Demo&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    tab: 'analyze',\n    stage: 'upload',\n    phase: 'upload',\n    status: 'Uploading clip…',\n    theme: 'dark',\n    marketFilter: 'All',\n    beltGuide: true,\n    libView: 'drills',\n    thread: null,\n    draft: '',\n    entryDraft: '',\n    soon: false,\n    chatCount: 0,\n    chat: [{ role: 'assistant', text: 'Good fight. Ask me about any moment, or what to drill next — I watched the whole thing.' }],\n    conversations: [\n      { id: 'ai', ai: true, name: 'Musashi AI Coach', sub: 'Always on · 5 follow-ups / clip', last: 'Your jab return is dropping — want a drill for it?', time: 'now', unread: 2,\n        msgs: [\n          { role: 'assistant', text: 'I broke down your last spar. Biggest leak: the lead hand drops on the jab return.' },\n          { role: 'assistant', text: 'Want me to add a recovery drill to your Library?' },\n        ] },\n      { id: 'mara', name: 'Mara Reyes', sub: 'Boxing coach · ★ 4.9', initials: 'MR', last: 'Sent the footwork breakdown — check the pivot at 0:24.', time: '2h', unread: 0,\n        msgs: [\n          { role: 'user', text: 'Hey coach — can you look at my round 3?' },\n          { role: 'assistant', text: 'On it. Sent you the footwork breakdown — check the pivot at 0:24.' },\n        ] },\n      { id: 'diego', name: 'Diego Santos', sub: 'MMA · ★ 4.8', initials: 'DS', last: 'Nice progress on the slip!', time: '1d', unread: 0,\n        msgs: [\n          { role: 'assistant', text: 'Nice progress on the slip! Keep the chin tucked through the counter and you\\u2019re there.' },\n        ] },\n    ],\n  };\n  timers = [];\n  soonTimer = null;\n\n  componentDidMount() {\n    const map = { Analyze: 'analyze', Market: 'market', Library: 'library', Inbox: 'inbox', Profile: 'profile' };\n    const st = this.props.startTab;\n    if (st && map[st]) this.setState({ tab: map[st] });\n    if (this.props.theme) this.setState({ theme: this.props.theme });\n  }\n  componentWillUnmount() { this.clearTimers(); if (this.soonTimer) clearTimeout(this.soonTimer); }\n  clearTimers() { this.timers.forEach(clearTimeout); this.timers = []; }\n  go(tab) { this.setState({ tab, thread: null }); }\n\n  feedbackSeed() {\n    return [\n      { role: 'assistant', text: 'Round 3 — I graded it B+. Solid orthodox base and a busy jab, but your lead hand drops on the return. Every jab opens the right side of your head for a counter. You\\u2019re scoring, but you\\u2019re paying for it.' },\n      { role: 'assistant', text: 'Fix these first:\\n\\u2022  Return the jab to your cheek, not your hip — same line out and back.\\n\\u2022  Reset your feet after the upload a clip and I\\u2019ll show you exactly where it slips?';\n    this.setState(s => ({\n      entryDraft: '', tab: 'inbox', thread: 'ai',\n      conversations: s.conversations.map(c => c.id === 'ai' ? { ...c, unread: 0, msgs: [...c.msgs, { role: 'user', text: v }, { role: 'assistant', text: reply }] } : c),\n    }));\n  }\n\n  sendThread(e) {\n    if (e && e.preventDefault) e.preventDefault();\n    const v = (this.state.draft || '').trim();\n    if (!v || !this.state.thread) return;\n    const id = this.state.thread;\n    this.setState(s => ({\n      draft: '',\n      conversations: s.conversations.map(c => {\n        if (c.id !== id) return c;\n        const reply = c.ai\n          ? 'Got it. Drop the timestamp and I\\u2019ll pull that exchange up and walk you through the fix frame by frame.'\n          : 'Thanks — I\\u2019ll review and get back to you with notes shortly.';\n        return { ...c, msgs: [...c.msgs, { role: 'user', text: v }, { role: 'assistant', text: reply }], unread: 0 };\n      }),\n    }));\n  }\n\n  renderVals() {\n    const s = this.state;\n    const ACT = '#C6461B', IN = 'var(--faint)';\n    const idx = { upload: 0, scan: 1, analyze: 2 }[s.phase];\n    const pc = (i) => i < idx ? '#C9A24C' : (i === idx ? '#C6461B' : 'var(--fainter)');\n\n    const allSessions = [\n      { title: 'Sparring — Round 3', date: 'Today · 2:14 PM', type: 'Boxing', grade: 'B+', gradeColor: '#C9A24C' },\n      { title: 'Bag work — combos', date: 'Yesterday · 6:40 PM', type: 'Boxing', grade: 'A-', gradeColor: '#C9A24C' },\n      { title: 'Clinch & knees', date: 'Mar 18 · 11:02 AM', type: 'Muay Thai', grade: 'B', gradeColor: 'var(--text)' },\n      { title: 'Open mat roll', date: 'Mar 16 · 7:25 PM', type: 'MMA', grade: 'C+', gradeColor: '#E0805F' },\n    ];\n    const sessions = allSessions.map(x => ({ ...x, open: () => this.setState({ tab: 'analyze', stage: 'results', chat: this.feedbackSeed(), chatCount: 0 }) }));\n\n    const mkChip = (label, cur, set) => {\n
