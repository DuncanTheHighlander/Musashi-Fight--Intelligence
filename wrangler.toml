#:schema node_modules/wrangler/config-schema.json
name = "app"
main = "src/cloudflare-worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
find_additional_modules = true
preserve_file_names = true

[[rules]]
type = "ESModule"
globs = [".open-next/**/*.js", ".open-next/**/*.mjs"]
fallthrough = true

[[rules]]
type = "Text"
globs = [".open-next/**/*.sql", ".open-next/**/*.html"]
fallthrough = true

[triggers]
crons = ["*/5 * * * *"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[alias]
sqlite = "./src/lib/workerEmptyModule.ts"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "app"

[[d1_databases]]
binding = "DB"
database_name = "musashi-db"
database_id = "c567e219-abc3-4ebb-868a-6c3b4cc4e5ae"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "MUSASHI_BUCKET"
bucket_name = "musashi"

[[r2_buckets]]
binding = "MUSASHI_UPLOADS_BUCKET"
bucket_name = "musashi-uploads"

[[vectorize]]
binding = "VECTORIZE"
index_name = "musashi-knowledge"

[ai]
binding = "AI"

# Cloudflare Secrets Store — store_id identifies the account store (not a credential).
# Workers read values via binding names + async env.BINDING.get().
[[secrets_store_secrets]]
binding = "SECRET_AI"
store_id = "3a6ee7307f0b482ab4b3f3dd6794168c"
secret_name = "Ai"

[[secrets_store_secrets]]
binding = "SECRET_MODAL"
store_id = "3a6ee7307f0b482ab4b3f3dd6794168c"
secret_name = "Modal"

[[secrets_store_secrets]]
binding = "SECRET_REVCAT1"
store_id = "3a6ee7307f0b482ab4b3f3dd6794168c"
secret_name = "revcat1"

[[secrets_store_secrets]]
binding = "SECRET_REVCAT2"
store_id = "3a6ee7307f0b482ab4b3f3dd6794168c"
secret_name = "revcat2"

[[secrets_store_secrets]]
binding = "SECRET_STRIPE"
store_id = "3a6ee7307f0b482ab4b3f3dd6794168c"
secret_name = "Stripe"

[[secrets_store_secrets]]
binding = "SECRET_SUPABASE"
store_id = "3a6ee7307f0b482ab4b3f3dd6794168c"
secret_name = "Supabase"

# Production vars (per-Worker secrets via `wrangler secret put` — see docs/MARKETPLACE_LAUNCH.md)
# Set STRIPE_* and STORAGE_* secrets before deploy; mock modes are for local dev only.
[vars]
MUSASHI_MARKETPLACE_PAYMENTS = "stripe"
MUSASHI_STORAGE_MODE = "r2"
GEMINI_EMBED_DIMENSION = "1536"
NODE_ENV = "production"
# Email verification is required for AI coaching when NODE_ENV=production (see assertEmailVerified).
# Set MUSASHI_REQUIRE_EMAIL_VERIFIED=0 only as an emergency override (not recommended).
# Email provider (Resend). EMAIL_API_KEY is a Worker secret — `wrangler secret put EMAIL_API_KEY`.
# EMAIL_FROM_ADDRESS domain must be verified in the Resend dashboard.
EMAIL_SERVICE_URL = "https://api.resend.com"
EMAIL_FROM_ADDRESS = "noreply@musashi.ai"
# Set your live URL after first deploy (Workers subdomain or custom domain):
# MUSASHI_APP_URL = "https://app.yourdomain.com"
